<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROZICKI</title>

    <link rel="icon" type="image/png" href="logo.png">
    
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            text-align: center;
        }
        .container {
            max-width: 400px;
            width: 100%;
        }
        /* Квадратный логотип без рамок */
        .profile-img {
            width: 150px; /* Немного увеличил, раз он теперь квадратный */
            height: auto;
            object-fit: contain;
            margin-bottom: 20px;
        }
        h1 {
            letter-spacing: 7px;
            font-size: 1.8rem;
            margin-bottom: 10px;
            text-transform: uppercase;
        }
        .description {
            color: #888;
            font-size: 0.9rem;
            margin-bottom: 30px;
            line-height: 1.4;
            letter-spacing: 1px;
        }
        .btn {
            display: block;
            margin-bottom: 15px;
            color: #fff;
            text-decoration: none;
            border: 1px solid #fff;
            padding: 15px;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: bold;
        }
        .btn:hover {
            background: #fff;
            color: #000;
        }
        .ozon {
            border-color: #005bff;
            color: #005bff;
        }
        .ozon:hover {
            background: #005bff;
            color: #fff;
        }
        .footer {
            font-size: 0.7rem;
            color: #444;
            margin-top: 50px;
            letter-spacing: 3px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="logo.png" alt="ROZICKI" class="profile-img">
        
        <h1>ROZICKI</h1>
        <div class="description">
            ИНДИВИДУАЛЬНЫЙ ДИЗАЙН<br>
            АВТОРСКАЯ ГРАВИРОВКА
        </div>

        <a href="https://www.ozon.ru/seller/ТВОЙ_АЙДИ" class="btn ozon">МАГАЗИН НА OZON</a>
        <a href="https://t.me/ТВОЙ_НИК" class="btn">СВЯЗАТЬСЯ В TELEGRAM</a>
        
        <div class="footer">HANDCRAFTED IN RUSSIA, TULA</div>
    </div>
</body>
</html>
